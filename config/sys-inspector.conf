# sys-inspector.conf — central configuration
# Source this file from any collector script

# Database location
SYSTEM_INSPECTOR_DB="${SYSTEM_INSPECTOR_DB:-/var/lib/sys-inspector/sys-inspector.db}"

# Alert thresholds
CPU_THRESHOLD_PCT="${CPU_THRESHOLD_PCT:-90}"
MEM_THRESHOLD_PCT="${MEM_THRESHOLD_PCT:-80}"
IOWAIT_THRESHOLD_PCT="${IOWAIT_THRESHOLD_PCT:-50}"
ZOMBIE_THRESHOLD="${ZOMBIE_THRESHOLD:-5}"

# Retention: auto-delete records older than this many days
RETENTION_DAYS="${RETENTION_DAYS:-90}"

# Baseline: number of boots before anomaly detection activates
BASELINE_MIN_SAMPLES="${BASELINE_MIN_SAMPLES:-5}"

# Anomaly: standard deviations from mean before flagging
ANOMALY_SIGMA="${ANOMALY_SIGMA:-2.0}"

# API server port
API_PORT="${API_PORT:-8765}"

# Logging
LOG_DIR="${LOG_DIR:-/var/log/sys-inspector}"
